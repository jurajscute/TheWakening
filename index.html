<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Wakening</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h1>The Wakening</h1>

    <div id="menu">
      <input id="nameInput" placeholder="Enter your name" />
      <button id="createBtn">Create Room</button>
      <input id="roomInput" placeholder="Room Code" />
      <button id="joinBtn">Join Room</button>
    </div>

    <div id="room" style="display:none;">
      <h2>Room: <span id="roomCode"></span></h2>
      <p id="roomStatus"></p>

      <div id="settingsPanel" class="panel">
        <h3>Role Settings</h3>
        <div id="settingsContent"></div>
      </div>

      <h3>Players</h3>
      <ul id="playerList"></ul>

      <button id="startBtn" style="display:none;">Start Game</button>
      <button id="leaveBtn">Leave Room</button>
    </div>

    <div id="game" style="display:none;">
      <h2>Room: <span id="gameRoomCode"></span></h2>
      <p id="phaseText"></p>

      <div id="roleCard" class="role-card">
        <h3>Your Role</h3>
        <p id="roleName">Unknown</p>
        <p id="roleTeam"></p>
        <p id="roleDescription"></p>
      </div>

      <div id="messagePanel" class="panel">
        <h3>Public Message</h3>
        <p id="publicMessageText"></p>
      </div>

      <div id="actionPanel" class="panel">
  <h3>Phase Action</h3>
  <p id="actionText"></p>
  <div id="actionControls"></div>
</div>

      <div id="winScreen">
  <div id="winScreenContent">
    <h2 id="winTitle">Game Over</h2>
    <p id="winSubtitle"></p>
    <p id="winYourRole"></p>
    <p id="winExtra"></p>
    <button id="restartBtn" style="display:none;">Restart To Lobby</button>
  </div>
</div>

      <div class="panel">
        <h3>Players</h3>
        <ul id="alivePlayerList"></ul>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
